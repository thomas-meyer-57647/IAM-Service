spring.application.name=iam-service

server.port=${IAM_SERVER_PORT:8102}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api/v1}

management.server.port=${IAM_MANAGEMENT_SERVER_PORT:8202}
management.endpoints.web.base-path=${MANAGEMENT_ENDPOINTS_WEB_BASE_PATH:/actuator}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never

spring.datasource.url=jdbc:mariadb://${IAM_DB_HOST:localhost}:${IAM_DB_PORT:3306}/${IAM_DB_NAME:iam}?useUnicode=true&characterEncoding=utf8&useSSL=false&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
spring.datasource.username=${IAM_DB_USERNAME:root}
spring.datasource.password=${IAM_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_iam

spring.devtools.restart.enabled=false

springdoc.api-docs.enabled=${iam.swagger.enabled:false}
springdoc.swagger-ui.enabled=${iam.swagger.enabled:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/public.pem
security.jwt.audience=${SECURITY_JWT_AUDIENCE:iam-service}
security.jwt.clock-skew-seconds=${SECURITY_JWT_CLOCK_SKEW_SECONDS:60}

iam.non-leak-404=${IAM_NON_LEAK_404:false}
iam.persistence.prevent-hard-delete=true
iam.swagger.enabled=${IAM_SWAGGER_ENABLED:false}

logging.level.org.flywaydb=DEBUG
