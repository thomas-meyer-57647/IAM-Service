# App
spring.application.name=iam-service
server.port=${IAMPORT:8080}

# Datasource (MariaDB)
spring.datasource.url=jdbc:mariadb://${IAM_DB_HOST:localhost}:${IAM_DB_PORT:3306}/${IAM_DB_NAME:iam}?useUnicode=true&characterEncoding=utf8&useSSL=false&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
spring.datasource.username=${IAM_DB_USER:root}
spring.datasource.password=${IAM_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA: Schema kommt von Flyway, Hibernate darf nur prüfen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_userservice
# spring.flyway.baseline-on-migrate=true

spring.devtools.restart.enabled=false

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator (optional, aber sinnvoll)
management.endpoints.web.exposure.include= health,info,metrics,prometheus
management.endpoint.health.show-details=never

logging.level.org.flywaydb=DEBUG

# Spring Security
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/public.pem
# classpath:keys/public.pem
# security.oauth2.resourceserver.jwt.issuer-uri: https://auth.example.com/realms/yourrealm
# Alternative statt issuer-uri:
# jwk-set-uri: https://auth.example.com/realms/yourrealm/protocol/openid-connect/certs

# Hard delete
iam.persistence.prevent-hard-delete=true
