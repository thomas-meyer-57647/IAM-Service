services:
  mysql:
    image: mysql:8.4
    container_name: iam-mysql
    environment:
      MYSQL_DATABASE: iam
      MYSQL_USER: root
      MYSQL_PASSWORD:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
    volumes:
      - iam_mysql_data:/var/lib/mysql

volumes:
  iam_mysql_data:
